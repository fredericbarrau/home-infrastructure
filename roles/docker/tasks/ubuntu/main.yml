- name: Install Docker on Debian
  block:
  - name: Add Docker Apt key
    ansible.builtin.get_url:
      url: https://download.docker.com/linux/ubuntu/gpg
      dest: /etc/apt/keyrings/docker.asc

  - name: Add Docker Apt repository
    ansible.builtin.apt_repository:
      repo: "deb [arch={{ ansible_facts['architecture'] | lower | regex_replace('x86_64','amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] | lower }} stable"
      state: present
      filename: docker
