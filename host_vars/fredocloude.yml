# Variables for the host fredocloude
# This file is encrypted with ansible-vault

# The hostname of the host
common_hostname: fredocloude

# The NFS directories to create
nfs_dirs:
  - /var/nfs

# The samba users
samba_users:
  - fredericbarrau

samba_server_string: "Fredocloude server"
samba_shares:
  - name: games
    comment: Game files
    path: /mnt/GamesBackup
    browsable: yes
    writable: yes
    guest ok: yes
    read only: no
    create mask: 0755
    public: yes
  - name: timemachine_1
    comment: Time Machine Backup 1
    path: /mnt/TimeMachine_1
    browsable: yes
    writable: yes
    guest ok: yes
    read only: no
    create mask: 0755
    public: yes
  - name: timemachine_2
    comment: Time Machine Backup 2
    path: /mnt/TimeMachine_2
    browsable: yes
    writable: yes
    guest ok: yes
    read only: no
    create mask: 0755
    public: yes


avahi_interfaces: 
  - enp1s6

mysql_user_home: /home/ansible
mysql_user_name: root
mysql_user_password: root
mysql_enabled_on_startup: true
mysql_databases:
  - name: panel
    encoding: utf8
    collation: utf8_general_ci
mysql_users:
  - name: pterodactyl
    host: "%"
    password: pterodactyl
    priv: "panel.*:ALL"
mysql_packages:
  - mariadb-client
  - mariadb-server
mysql_daemon: mariadb

